<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="js/scripts.js" defer></script>
    <link rel="shortcut icon" href="./assets/image/logo.png" type="image/png-icon">
    <link rel="stylesheet" href="css/output.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Corallus</title>
  </head>
  <body>
    <!-- HEADER -->
    <header class="bg-(--rosado) navbar font-bold">
      <div class="flex items-center">
        <a href="#" class="mr-12">
          <img src="./assets/image/logo.png" alt="logo" class="max-h-20" />
        </a>
        <nav>
          <ul class="flex gap-8 text-white text-xl text-center p-3">
            <a href="#">
              <li>HOME</li>
            </a>
            <a href="#">
              <li>QUEM SOMOS</li>
            </a>
            <a href="#">
              <li>NOSSOS PROJETOS</li>
            </a>
            <a href="#">
              <li>PARCEIROS</li>
            </a>
            <a href="#">
              <li>FALE CONOSOCO</li>
            </a>
          </ul>
        </nav>
      </div>
    </header>

    <!-- HOME -->
<main>
  <section
    style="
      height: calc(100vh - 90px);
      background-image: url('./assets/image/fundoHomeCorallus.png');
      background-size: cover;
      background-position: center right;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;">
    <div>
      <h1 style="font-size: 4rem; font-family: serif;">
        Corallus
      </h1>

      <p style="font-size: 1.5rem; margin-top: 0.5rem;">
        Juntos Inovando
      </p>

      <div
        style="
          margin-top: 2rem;
          display: flex;
          align-items: center;
          gap: 1rem;
          border: 2px solid white;
          border-radius: 999px;
          padding: 0.75rem 1.5rem;
          width: 400px;">
        <i class="bi bi-search"></i>

        <input
          type="text"
          placeholder="Pesquisar"
          style="
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;"/>

        <i class="bi bi-mic-fill"></i>
      </div>
    </div>
  </section>
</main>


    <!-- FOOTER -->
    <section id="footer">
      <div class="bg-(--rosado) w-full p-5 text-white">
        <div class="flex justify-between">
          <h2 class="text-xl">Precisa de suporte?</h2>
          <h2 class="text-xl">Siga-nos</h2>
        </div>

        <div class="grid grid-cols-3">
          <div class="col-span-1">
            <div class="flex flex-col text-3xl">
              <a href=""><i class="bi bi-twitter-x"></i></a>
              <a href=""><i class="bi bi-whatsapp"></i></a>
              <a href=""><i class="bi bi-envelope-fill"></i></a>
              <a href=""><i class="bi bi-telephone-fill"></i></a>
            </div>
          </div>
          <div class="col-span-1 flex justify-center">
            <img src="./assets/image/logo.png" alt="Logo" class="max-h-28" />
          </div>

          <div class="col-span-1">
            <div class="flex flex-col items-end text-3xl">
              <a href=""><i class="bi bi-youtube"></i></a>
              <a href=""><i class="bi bi-facebook"></i></a>
              <a href=""><i class="bi bi-instagram"></i></a>
            </div>
          </div>
        </div>

        <div class="flex justify-between border-t-2 border-white mt-5">
          <a href="" class="text-xs">Políticas de privacidade</a>
          <a href="" class="text-xs" id="copy">Todos os direitos reservados - Corallus </a>
        </div>
      </div>
    </section>
  </body>
</html>
