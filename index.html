    <main>

      <!-- PARCEIROS -->
      <section id="parceiros"></section>

      <!-- NOSSOS PROJETOS -->

      <!-- FALE CONOSCO -->
      <section id="fale-conosco">
        <!-- CONTAINER WRAPPER -->
        <div class="flex justify-center p-3">
          <!-- FORM -->
          <form
            class="flex flex-col w-[60%] gap-5 rounded-3xl border-2 border-stone-400 p-5"
            action="mail.php"
            method="post"
          >
            <div class="flex justify-center">
              <h2 class="font-semibold text-3xl">Fale Conosco</h2>
            </div>
            <div class="grid grid-cols-6">
              <!-- NOME -->
              <div class="flex flex-col col-span-3 gap-1.5">
                <label class="font-light" for="nome">Nome Completo</label>
                <div
                  class="flex border ease-in-out duration-300 p-1 items-center
                  border-stone-300 rounded-lg has-focus:border-sky-600"
                >
                  <i class="bi bi-person p-1 text-lg"></i>
                  <input
                    required
                    class="outline-none w-full font-normal
                    text-sm placeholder:text-stone-400 ease-in-out duration-300
                    focus:p-1 focus:text-md"
                    placeholder="Nome Completo"
                    type="text"
                    name="nome"
                    id="nome"
                  />
                </div>
              </div>
            </div>
            <div class="grid grid-cols-12 justify-around">
              <!-- EMAIL -->
              <div class="flex flex-col-reverse col-span-6">
                <div
                  class="flex flex-row-reverse border p-1 items-center peer border-stone-300
                  rounded-lg ease-in-out duration-300 has-invalid:border-red-600
                  has-valid:has-focus:border-sky-600"
                >
                  <input
                    placeholder="E-mail"
                    class="w-full outline-none peer
                    invalid:text-red-600 text-sm placeholder:text-stone-400
                    ease-in-out duration-300 focus:p-1 focus:text-md"
                    type="email"
                    name="email"
                    required
                  />
                  <i class="bi ease-in-out duration-200 bi-envelope
                  text-lg p-1 peer-invalid:text-red-600"></i>
                  
                </div>
                <span class="peer-has-invalid:block hidden
                font-light text-red-600 text-xs">* E-mail inválido</span>
                <label class="font-light pl-2" for="email">E-mail</label>
              </div>
              <!-- ASSUNTO -->
              <div class="flex flex-col justify-end gap-1.5 col-end-12 col-span-4">
                <label class="font-light" for="assunto">Assunto</label>
                <select
                  class="outline-none border ease-in-out duration-300 focus:border-sky-600
                  rounded-lg border-stone-300 text-sm p-3"
                  name="assunto"
                  id="assunto"
                ><option class="text-sm font-medium" value="">Selecione</option></select>
              </div>
            </div>
            <!-- MENSAGEM -->
            <div class="flex flex-col mb-3 ">
              <label class="font-light" for="msg">Mensagem</label>
              <textarea
                class="focus:border-sky-600 outline-none text-sm
                border min-h-28 border-stone-300 p-1.5 rounded-lg
                max-h-37.5 ease-in-out duration-200"
                maxlength="600"
                name="msg"
                placeholder="Escreva sua mensagem..."
                id="msg"
              ></textarea>
            </div>
            <!-- BOTÕES -->
            <div class="grid grid-cols-12 gap-5">
              <button
                type="reset"
                class="cursor-pointer col-span-3 col-start-7 border text-stone-600
                p-1 border-stone-600 rounded-md font-light
                ease-in-out duration-200 hover:bg-stone-100"
              >
                Limpar
              </button>
              <button
              type="submit"
                class="cursor-pointer col-span-3 border bg-stone-700 p-1
                text-white border-stone-600 rounded-md font-light
                text-md ease-in-out duration-200 hover:bg-stone-600"
              >
                Enviar
              </button>
            </div>
          </form>
        </div>
      </section>
