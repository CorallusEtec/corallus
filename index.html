      <!-- FALE CONOSCO -->

      <section id="fale-conosco">
        <div class="flex justify-center">
          <div class="bg-(--maisRosa) m-3 text-white rounded-sm p-5 w-6/12">
            <div class="flex justify-center p-3">
              <h1 class="text-6xl font-semibold">Fale Conosco</h1>
            </div>
            <div class="flex flex-col bg-(--bege) p-5 rounded-sm">
              <form action="mail.php" method="post">
                <!-- Nome -->
                <div class="flex flex-col mb-4">
                  <label for="nome" class="text-(--rosado) font-semibold"
                    >Nome Completo:
                  </label>
                  <input
                    placeholder="Nome"
                    id="nome"
                    name="nome"
                    type="text"
                    class="fd max-w-6/12 bg-white rounded-md p-1 border-2 border-(--rosado) outline-0 text-stone-500 font-semibold"
                  />
                </div>
                <!-- Email e Assunto -->
                <div class="grid grid-cols-3 items-center mb-5">
                  <!-- Email-->
                  <div class="flex flex-col col-span-2">
                    <label for="email" class="text-(--rosado) font-semibold"
                      >Email:
                    </label>
                    <input
                      placeholder="Email"
                      id="email"
                      name="email"
                      type="email"
                      class="fd max-w-9/12 bg-white rounded-md p-1 border-2 border-(--rosado) outline-0 text-stone-500 font-semibold"
                    />
                  </div>
                  <!-- Assunto -->
                  <div class="flex flex-col col-span-1 gap-1">
                    <label for="assunto" class="text-(--rosado) font-semibold"
                      >Assunto:</label
                    >
                    <select
                      name="assunto"
                      id="assunto"
                      class="fd bg-white rounded-md p-1 border-2 border-(--rosado) outline-0 text-stone-500 font-semibold"
                    >
                      <option value="" class="text-sm">Selecione</option>
                    </select>
                  </div>
                </div>
                <!-- Mensagem -->
                <div class="flex flex-col mb-5">
                  <label for="msg" class="text-(--rosado) font-semibold"
                    >Mensagem:</label
                  >
                  <textarea
                    name="msg"
                    id="msg"
                    maxlength="700"
                    placeholder="Mensagem"
                    class="fd bg-white rounded-md min-h-28 max-h-44 p-1 border-2 border-(--rosado) outline-0 text-stone-500 font-semibold"
                  ></textarea>
                </div>
                <!-- Botões -->
                <div class="grid grid-cols-3 gap-2">
                  <div class="col-span-2 grid grid-cols-2">
                    <button
                      type="reset"
                      class="col-start-2 hover:bg-stone-100 cursor-pointer border-2 text-(--rosado) border-(--rosado) bg-white p-1.5"
                    >
                      Limpar
                    </button>
                  </div>

                  <button
                    class="col-span-1 border cursor-pointer p-1.5 bg-(--rosado) border-red-800 hover:bg-(--rosadoHover)"
                    type="submit"
                    id="submit"
                  >
                    Enviar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
