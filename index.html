  <body>

    <header class="bg-(--rosado) navbar font-bold">

        </a>
        <nav>
          <ul class="flex gap-8 text-white text-xl text-center p-3">
            <a href="#">
              <li>HOME</li>
            </a>
            <a href="#">
              <li>QUEM SOMOS</li>
            </a>
            <a href="#">
              <li>NOSSOS PROJETOS</li>
            </a>
            <a href="#">

    <!-- HOME -->
<main>

  >
    <div>
      <h1 class="text-6xl font-serif ">
        Corallus

      <p class="text-2xl mt-2">

      <div
        class="mt-8 flex items-center gap-4 border-2 border-white rounded-full py-3 px-6 w-[400px]"
      >
        <i class="bi bi-search"></i>

        <input
          type="text"
          placeholder="Pesquisar"
          class="flex-1 bg-transparent border-none outline-none text-white placeholder-white"
        />

        <i class="bi bi-mic-fill"></i>
      </div>
    </div>

          <h2 class="text-xl">Precisa de suporte?</h2>

        </div>

        <div class="grid grid-cols-3">
          <div class="col-span-1">
            <div class="flex flex-col text-3xl">
              <a href=""><i class="bi bi-twitter-x"></i></a>

              <a href=""><i class="bi bi-envelope-fill"></i></a>
              <a href=""><i class="bi bi-telephone-fill"></i></a>

          </div>

          <div class="col-span-1">
            <div class="flex flex-col items-end text-3xl">
              <a href=""><i class="bi bi-youtube"></i></a>
              <a href=""><i class="bi bi-facebook"></i></a>
              <a href=""><i class="bi bi-instagram"></i></a>
            </div>
